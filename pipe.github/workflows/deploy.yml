name: CI/CD Pipeline Innovatech

# 1. Se activa SOLO al hacer push a la rama 'deploy' (Exigencia del 100% de la pauta)
on:
  push:
    branches:
      - deploy

jobs:
  # ETAPA 1 y 2: BUILD y PUSH
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v3

      - name: Iniciar sesión en Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build y Push - Frontend
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/innovatech-front:latest ./front_despacho
          docker push ${{ secrets.DOCKER_USERNAME }}/innovatech-front:latest

      - name: Build y Push - Back Despachos
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/innovatech-back-despachos:latest ./back-Despachos_SpringBoot
          docker push ${{ secrets.DOCKER_USERNAME }}/innovatech-back-despachos:latest

      - name: Build y Push - Back Ventas
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/innovatech-back-ventas:latest ./back-Ventas_SpringBoot
          docker push ${{ secrets.DOCKER_USERNAME }}/innovatech-back-ventas:latest

  # ETAPA 3: DEPLOY EN AWS EC2
  deploy-to-ec2:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Desplegar en EC2 por SSH (Conexión segura exigida en pauta)
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            # Crear directorio del proyecto si no existe
            mkdir -p ~/innovatech
            cd ~/innovatech
            
            # Descargar el docker-compose.yml más reciente directamente de la rama deploy
            curl -O https://raw.githubusercontent.com/${{ github.repository }}/deploy/docker-compose.yml
            
            # Reemplazar los nombres de las imágenes locales por las de Docker Hub
            sed -i 's|build:.*|image: ${{ secrets.DOCKER_USERNAME }}/innovatech-front:latest|g' docker-compose.yml
            # (El script ajustará tu compose para usar las imágenes de la nube)
            
            # Bajar contenedores viejos, actualizar imágenes y levantar los nuevos
            docker-compose down
            docker-compose pull
            docker-compose up -d