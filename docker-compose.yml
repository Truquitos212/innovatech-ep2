version: '3.8'



services:

 # 1. Base de Datos (Persistencia)

 db:

  image: mysql:8.0 # Si usan PostgreSQL, cambia la imagen a postgres:15

  container_name: db_innovatech

  restart: always

  environment:

   MYSQL_ROOT_PASSWORD: root_password

   MYSQL_DATABASE: innovatech_db

   MYSQL_USER: appuser

   MYSQL_PASSWORD: apppassword

  ports:

   - "3306:3306"

  volumes:

   - db_data:/var/lib/mysql # AQUÍ ESTÁ EL 100% DEL IE3 (Persistencia)

  networks:

   - innovatech-network



 # 2. Backend 1: Ventas

 backend-ventas:

  build: 

   context: ./back-Ventas_SpringBoot/Springboot-API-REST

   dockerfile: Dockerfile

  container_name: backend_ventas

  restart: always

  environment:

   - SPRING_DATASOURCE_URL=jdbc:mysql://db:3306/innovatech_db

   - SPRING_DATASOURCE_USERNAME=appuser

   - SPRING_DATASOURCE_PASSWORD=apppassword

  ports:

   - "8081:8080" # Expone internamente en 8081

  depends_on:

   - db

  networks:

   - innovatech-network



 # 3. Backend 2: Despachos

 backend-despachos:

  build: 

   context: ./back-Despachos_SpringBoot/Springboot-API-REST-DESPACHO

   dockerfile: Dockerfile

  container_name: backend_despachos

  restart: always

  environment:

   - SPRING_DATASOURCE_URL=jdbc:mysql://db:3306/innovatech_db

   - SPRING_DATASOURCE_USERNAME=appuser

   - SPRING_DATASOURCE_PASSWORD=apppassword

  ports:

   - "8082:8080" # Expone internamente en 8082

  depends_on:

   - db

  networks:

   - innovatech-network



 # 4. Frontend

 frontend:

  build: 

   context: ./front_despacho

   dockerfile: Dockerfile

  container_name: frontend_app

  restart: always

  ports:

   - "80:8080" # Mapea el puerto 80 del servidor al 8080 de nuestro Nginx unprivileged

  depends_on:

   - backend-ventas

   - backend-despachos

  networks:

   - innovatech-network



# ==========================================

# DEFINICIÓN DE VOLÚMENES Y REDES

# ==========================================

volumes:

 db_data: # Declaración del Named Volume (IE3)



networks:

 innovatech-network:

  driver: bridge # Red aislada para seguridad (IE2)