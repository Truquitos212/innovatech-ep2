version: '3.8'

services:
  # ==========================================
  # BASE DE DATOS (Persistencia exigida en rúbrica)
  # ==========================================
  db:
    image: mysql:8.0
    container_name: bd_proyecto
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: proyecto_db
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql # ¡ESTO ES CLAVE PARA TU NOTA! (Named Volume)

  # ==========================================
  # BACKEND 1: VENTAS
  # ==========================================
  back-ventas:
    build: 
      context: ./back-Ventas_SpringBoot/Springboot-API-REST # <-- RUTA ACTUALIZADA
      dockerfile: Dockerfile
    container_name: api_ventas
    ports:
      - "8081:8080"
    depends_on:
      - db
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://db:3306/proyecto_db
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root

  # ==========================================
  # BACKEND 2: DESPACHOS
  # ==========================================
  back-despachos:
    build: 
      context: ./back-Despachos_SpringBoot/Springboot-API-REST-DESPACHO # <-- RUTA ACTUALIZADA
      dockerfile: Dockerfile
    container_name: api_despachos
    ports:
      - "8082:8080"
    depends_on:
      - db
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://db:3306/proyecto_db
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root

  # ==========================================
  # FRONTEND
  # ==========================================
  frontend:
    build: 
      context: ./front_despacho
      dockerfile: Dockerfile
    container_name: app_frontend
    ports:
      - "3000:8080" # Mapeamos el 3000 de tu PC al 8080 de Nginx (no-root)
    depends_on:
      - back-ventas
      - back-despachos

# Declaración del volumen nombrado para la persistencia
volumes:
  db_data: